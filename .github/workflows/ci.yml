name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions (principle of least privilege)
permissions:
  contents: read

jobs:
  python:
    name: Python — lint & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dev tools
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Syntax check
        run: python -m py_compile server.py dub_pipeline.py gemini_video.py

  frontend:
    name: Frontend — JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: i18n.js syntax check
        run: node --check static/i18n.js
