name: Bug report
description: Report a problem with KurdîTV
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /create
        2. Upload …
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dubbing (/)
        - Contribute (/contribute)
        - Create videos (/create)
        - i18n / translations
        - Other
    validations:
      required: true
  - type: input
    id: locale
    attributes:
      label: Language / locale
      placeholder: e.g. ku (Soranî, RTL)
  - type: textarea
    id: env
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 124 on Android
